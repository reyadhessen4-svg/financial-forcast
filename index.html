        .login-input { width: 100%; padding: 14px 16px; margin-bottom: 16px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 15px; font-family: 'Tajawal', sans-serif; box-sizing: border-box; }
        .login-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .login-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Tajawal', sans-serif; }
        .login-btn:hover { background: #4338ca; }
        .login-error { color: var(--danger); font-size: 13px; font-weight: 700; margin-top: 15px; display: none; }
        .login-hint { margin-top: 20px; font-size: 11px; color: var(--gray-600); text-align: right; background: var(--gray-50); padding: 10px; border-radius: 8px; }
